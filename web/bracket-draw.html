<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket Wheel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar Styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-200 font-sans p-4 md:p-8 flex flex-col xl:flex-row gap-8">

    <!-- LEFT PANEL: CONFIGURATION -->
    <div class="w-full xl:w-[380px] shrink-0 flex flex-col gap-6">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
            <div class="flex items-center gap-3 mb-6">
                <!-- Trophy Icon -->
                <svg class="text-yellow-500 w-8 h-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                    <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                    <path d="M4 22h16"></path>
                    <path d="M10 14.66V17c0 1.1-.9 2-2 2H4"></path>
                    <path d="M14 14.66V17c0 1.1.9 2 2 2h8"></path>
                    <path d="M8 22H16"></path>
                    <path d="M15.5 4h-7a4.5 4.5 0 0 0-4.5 4.5v1.2a5.3 5.3 0 0 0 5.3 5.3h3.4a5.3 5.3 0 0 0 5.3-5.3V8.5A4.5 4.5 0 0 0 15.5 4z"></path>
                </svg>
                <h1 class="text-2xl font-bold text-white tracking-tight">Bracket Generator</h1>
            </div>

            <div id="inputs-container" class="flex flex-col gap-3 max-h-[40vh] xl:max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Inputs render here -->
            </div>

            <button id="btn-add" class="mt-4 w-full flex items-center justify-center gap-2 py-3 px-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-lg transition-colors border border-slate-700 border-dashed disabled:opacity-50">
                <!-- Plus Icon -->
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
                Add Team Row
            </button>
        </div>

        <button id="btn-generate" class="w-full flex items-center justify-center gap-3 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg transition-all bg-indigo-600 hover:bg-indigo-500 text-white hover:shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed">
            <!-- Content swaps dynamically -->
        </button>
    </div>

    <!-- RIGHT PANEL: VISUALIZATION -->
    <div class="w-full flex-1 flex flex-col gap-6 min-w-0">
        
        <!-- BANNER -->
        <div id="banner-container" class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 p-6 min-h-[200px]">
            <!-- Banner content renders here -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
        </div>

        <!-- BRACKET TREE -->
        <div id="bracket-wrapper" class="hidden bg-slate-900/50 border border-slate-800/50 rounded-2xl p-6 flex-1 overflow-x-auto custom-scrollbar relative">
            <div id="bracket-container" class="flex flex-row gap-12 min-h-[500px] h-full items-stretch pb-8">
                <!-- Bracket renders here -->
            </div>
        </div>
    </div>

    <!-- APPLICATION LOGIC -->
    <script>
        // --- SVG Icons ---
        const ICONS = {
            users: `<svg class="h-4 w-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            trash: `<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`,
            dices: `<svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01M10 14h.01M15 6h.01M18 9h.01"/></svg>`,
            dicesBig: `<svg class="w-16 h-16 mx-auto mb-4 opacity-20" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01M10 14h.01M15 6h.01M18 9h.01"/></svg>`,
            dicesSpinning: `<svg class="w-8 h-8 text-indigo-400 animate-spin" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01M10 14h.01M15 6h.01M18 9h.01"/></svg>`,
            refresh: `<svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`,
            chevron: `<svg class="w-4 h-4 opacity-50" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
            trophy: `<svg class="mx-auto text-yellow-500 w-12 h-12 mb-3 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"></path><path d="M14 14.66V17c0 1.1.9 2 2 2h8"></path><path d="M8 22H16"></path><path d="M15.5 4h-7a4.5 4.5 0 0 0-4.5 4.5v1.2a5.3 5.3 0 0 0 5.3 5.3h3.4a5.3 5.3 0 0 0 5.3-5.3V8.5A4.5 4.5 0 0 0 15.5 4z"></path></svg>`
        };

        // --- State Management ---
        let state = {
            inputs: [{ id: Date.now(), name: '', count: 1 }],
            rounds: [],
            isSpinning: false,
            spinValue: "",
            activeSpinIndex: -1,
            hasGenerated: false,
            bracketSize: 0
        };

        // DOM Elements
        const inputsContainer = document.getElementById('inputs-container');
        const btnAdd = document.getElementById('btn-add');
        const btnGenerate = document.getElementById('btn-generate');
        const bannerContainer = document.getElementById('banner-container');
        const bracketWrapper = document.getElementById('bracket-wrapper');
        const bracketContainer = document.getElementById('bracket-container');

        // --- UI Rendering ---

        function renderInputs() {
            inputsContainer.innerHTML = '';
            state.inputs.forEach((inp) => {
                const row = document.createElement('div');
                row.className = 'flex gap-2 items-center group';
                
                // Select options html
                let optionsHtml = '';
                for(let i=1; i<=26; i++) {
                    optionsHtml += `<option value="${i}" ${inp.count === i ? 'selected' : ''}>${i}</option>`;
                }

                row.innerHTML = `
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            ${ICONS.users}
                        </div>
                        <input
                            type="text"
                            ${state.isSpinning ? 'disabled' : ''}
                            placeholder="Enter team or name..."
                            value="${inp.name.replace(/"/g, '&quot;')}"
                            oninput="updateInput(${inp.id}, 'name', this.value)"
                            class="w-full bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent block pl-10 p-2.5 transition-colors disabled:opacity-50"
                        />
                    </div>
                    <select
                        ${state.isSpinning ? 'disabled' : ''}
                        onchange="updateInput(${inp.id}, 'count', parseInt(this.value))"
                        class="bg-slate-950 border border-slate-700 text-slate-200 text-sm rounded-lg focus:ring-2 focus:ring-indigo-500 block p-2.5 outline-none cursor-pointer disabled:opacity-50"
                        title="Number of variants (A~Z)"
                    >
                        ${optionsHtml}
                    </select>
                    <button
                        ${state.isSpinning || state.inputs.length === 1 ? 'disabled' : ''}
                        onclick="removeInput(${inp.id})"
                        class="p-2.5 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                    >
                        ${ICONS.trash}
                    </button>
                `;
                inputsContainer.appendChild(row);
            });
            
            btnAdd.disabled = state.isSpinning;
        }

        function renderControls() {
            btnGenerate.disabled = state.isSpinning;
            if (state.hasGenerated && !state.isSpinning) {
                btnGenerate.className = "w-full flex items-center justify-center gap-3 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg transition-all bg-slate-800 hover:bg-slate-700 text-white disabled:opacity-50 disabled:cursor-not-allowed";
                btnGenerate.innerHTML = `${ICONS.refresh} Reset Bracket`;
                btnGenerate.onclick = resetBracket;
            } else {
                btnGenerate.className = "w-full flex items-center justify-center gap-3 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg transition-all bg-indigo-600 hover:bg-indigo-500 text-white hover:shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed";
                btnGenerate.innerHTML = `${ICONS.dices} Generate Draw`;
                btnGenerate.onclick = handleGenerate;
            }
        }

        function renderBanner() {
            if (state.hasGenerated) {
                bannerContainer.className = "bg-slate-900 border border-slate-800 rounded-2xl shadow-xl flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 p-4 min-h-[100px]";
                bannerContainer.innerHTML = `
                    <div class="flex items-center gap-4">
                        ${state.isSpinning ? ICONS.dicesSpinning : ''}
                        <div>
                            <p class="text-slate-400 font-semibold tracking-widest text-xs mb-1 text-center">
                                ${state.isSpinning ? 'SPINNING ROUND 1' : 'TOURNAMENT ACTIVE - CLICK WINNERS TO ADVANCE'}
                            </p>
                            <h2 class="text-2xl md:text-3xl font-black text-center transition-all duration-100 ${state.isSpinning ? 'text-yellow-400 scale-105' : 'text-indigo-400'}">
                                ${state.spinValue}
                            </h2>
                        </div>
                    </div>
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
                `;
            } else {
                bannerContainer.className = "bg-slate-900 border border-slate-800 rounded-2xl shadow-xl flex flex-col items-center justify-center relative overflow-hidden transition-all duration-500 p-6 min-h-[200px]";
                bannerContainer.innerHTML = `
                    <div class="text-center text-slate-500">
                        ${ICONS.dicesBig}
                        <p class="text-lg">Add your teams and hit Generate to build the tree.</p>
                    </div>
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>
                `;
            }
        }

        function getTeamStatus(team, rIdx, mIdx) {
            if (!team) return 'empty';
            if (team.isBye) return 'bye';
            if (rIdx >= state.rounds.length - 1) return 'champion'; 

            const nextRound = state.rounds[rIdx + 1];
            const nextMatchIndex = Math.floor(mIdx / 2);
            const isTopSlot = mIdx % 2 === 0;
            
            let advancedTeam = null;
            if (rIdx + 1 === state.rounds.length - 1) {
               advancedTeam = nextRound[0].t1;
            } else {
               advancedTeam = isTopSlot ? nextRound[nextMatchIndex].t1 : nextRound[nextMatchIndex].t2;
            }

            if (!advancedTeam) return 'pending';
            if (advancedTeam.name === team.name) return 'winner';
            return 'loser';
        }

        function renderBracket() {
            if (!state.hasGenerated) {
                bracketWrapper.classList.add('hidden');
                bracketContainer.innerHTML = '';
                return;
            }
            bracketWrapper.classList.remove('hidden');

            let html = '';
            
            state.rounds.forEach((round, rIdx) => {
                const isChampionRound = rIdx === state.rounds.length - 1;
                
                html += `<div class="flex flex-col justify-around min-w-[220px] relative">`;
                
                // Header
                html += `<div class="absolute -top-4 left-0 right-0 text-center font-bold text-slate-500 tracking-wider text-sm uppercase">
                            ${isChampionRound ? 'Champion' : `Round ${rIdx + 1}`}
                         </div>`;

                if (isChampionRound) {
                    const teamName = round[0].t1 ? round[0].t1.name : 'TBD';
                    html += `
                        <div class="bg-gradient-to-b from-yellow-500/20 to-yellow-500/5 border-2 border-yellow-500/50 rounded-2xl p-6 text-center shadow-[0_0_30px_rgba(234,179,8,0.1)]">
                            ${ICONS.trophy}
                            <div class="text-xs text-yellow-500/80 uppercase tracking-widest font-bold mb-1">Tournament Winner</div>
                            <div class="font-black text-yellow-400 text-2xl break-words">${teamName}</div>
                        </div>
                    `;
                } else {
                    round.forEach((match, mIdx) => {
                        const statusT1 = getTeamStatus(match.t1, rIdx, mIdx);
                        const statusT2 = getTeamStatus(match.t2, rIdx, mIdx);
                        const isT1ActiveSpin = state.isSpinning && rIdx === 0 && state.activeSpinIndex === mIdx * 2;
                        const isT2ActiveSpin = state.isSpinning && rIdx === 0 && state.activeSpinIndex === mIdx * 2 + 1;

                        html += `
                            <div class="relative flex items-center my-2">
                                <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 shadow-lg w-full flex flex-col z-10">
                                    ${renderTeamSlot(match.t1, statusT1, isT1ActiveSpin, rIdx, mIdx, 't1')}
                                    <div class="h-px bg-slate-700 w-full relative">
                                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-800 text-[9px] text-slate-500 font-bold px-2 rounded-full border border-slate-700">VS</div>
                                    </div>
                                    ${renderTeamSlot(match.t2, statusT2, isT2ActiveSpin, rIdx, mIdx, 't2')}
                                </div>
                                <div class="absolute -right-6 w-6 h-px bg-slate-700 -z-0"></div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;
            });
            
            bracketContainer.innerHTML = html;
        }

        function renderTeamSlot(team, status, isSpinningActive, rIdx, mIdx, slotId) {
            let styles = "bg-slate-800 text-slate-300"; 
            let interactionStyles = "hover:bg-slate-700 cursor-pointer";
            let onClickAttr = `onclick="handleAdvance(${rIdx}, ${mIdx}, '${slotId}')"`;

            if (isSpinningActive) {
                styles = "bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)] z-20 font-bold border border-indigo-400";
                interactionStyles = "cursor-default";
                onClickAttr = "";
            } else if (status === 'empty') {
                styles = "bg-slate-900/50 text-slate-600 border border-transparent";
                interactionStyles = "cursor-default";
                onClickAttr = "";
            } else if (status === 'bye') {
                styles = "bg-slate-900/50 text-slate-500 italic border border-transparent";
                interactionStyles = "cursor-default";
                onClickAttr = "";
            } else if (status === 'winner' || status === 'champion') {
                styles = "bg-indigo-600 text-white font-bold border border-indigo-500 shadow-md";
                interactionStyles = "cursor-default";
                onClickAttr = "";
            } else if (status === 'loser') {
                styles = "bg-slate-900 text-slate-600 opacity-60 border border-transparent";
                interactionStyles = "hover:opacity-100 hover:bg-slate-800 cursor-pointer"; 
            } else if (status === 'pending') {
                styles = "bg-slate-800 text-slate-200 font-medium border border-transparent";
            }

            const teamName = team ? team.name : (isSpinningActive ? 'Rolling...' : 'TBD');
            const winnerIcon = status === 'winner' ? ICONS.chevron : '';
            const spinGlow = isSpinningActive ? `
                <span class="absolute right-3 top-1/2 -translate-y-1/2 flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                </span>
            ` : '';

            return `
                <div ${onClickAttr} class="px-4 py-3 text-sm transition-all duration-300 relative select-none flex items-center justify-between ${styles} ${interactionStyles}">
                    <span class="truncate pr-2">${teamName}</span>
                    ${winnerIcon}
                    ${spinGlow}
                </div>
            `;
        }

        function updateUI() {
            renderInputs();
            renderControls();
            renderBanner();
            renderBracket();
        }

        // --- Core Algorithms ---

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const shuffleBracketBranches = (layout) => {
            if (layout.length <= 2) {
                if (layout.length === 2 && Math.random() > 0.5) {
                    return [layout[1], layout[0]]; 
                }
                return layout;
            }
            const half = layout.length / 2;
            const left = shuffleBracketBranches(layout.slice(0, half));
            const right = shuffleBracketBranches(layout.slice(half));
            return Math.random() > 0.5 ? [...left, ...right] : [...right, ...left];
        };

        const getStandardSeeding = (numTeams) => {
            let roundsCount = Math.log2(numTeams);
            let bracket = [1];
            for (let i = 0; i < roundsCount; i++) {
                let nextBracket = [];
                let sum = Math.pow(2, i + 1) + 1;
                for (let j = 0; j < bracket.length; j++) {
                    nextBracket.push(bracket[j]);
                    nextBracket.push(sum - bracket[j]);
                }
                bracket = nextBracket;
            }
            return bracket;
        };

        // --- Input Handlers ---
        
        window.updateInput = (id, field, value) => {
            state.inputs = state.inputs.map(inp => inp.id === id ? { ...inp, [field]: value } : inp);
            // We intentionally don't call updateUI() here to prevent focus loss while typing
        };

        window.removeInput = (id) => {
            if (state.inputs.length > 1) {
                state.inputs = state.inputs.filter(inp => inp.id !== id);
                updateUI();
            }
        };

        btnAdd.onclick = () => {
            state.inputs.push({ id: Date.now(), name: '', count: 1 });
            updateUI();
            
            // Scroll to bottom
            setTimeout(() => {
                inputsContainer.scrollTop = inputsContainer.scrollHeight;
            }, 10);
        };

        window.resetBracket = () => {
            state.hasGenerated = false;
            state.rounds = [];
            state.spinValue = "";
            updateUI();
        };

        // --- Bracket Logic ---

        window.handleGenerate = () => {
            if (state.isSpinning) return;

            let flatTeams = [];
            let groupId = 0;
            
            state.inputs.forEach(input => {
                const cleanName = input.name.trim();
                if (!cleanName) return;
                groupId++;
                
                if (input.count === 1) {
                    flatTeams.push({ name: cleanName, group: groupId });
                } else {
                    for (let i = 0; i < input.count; i++) {
                        const prefix = String.fromCharCode(65 + i); 
                        flatTeams.push({ name: `${prefix} - ${cleanName}`, group: groupId });
                    }
                }
            });

            if (flatTeams.length < 2) {
                alert("Please enter at least 2 teams to generate a bracket.");
                return;
            }

            let N = 2;
            while (N < flatTeams.length) N *= 2;
            state.bracketSize = N;

            let groups = {};
            flatTeams.forEach(t => {
                if (!groups[t.group]) groups[t.group] = [];
                groups[t.group].push(t);
            });

            let groupArrays = Object.values(groups).map(arr => shuffleArray(arr));
            groupArrays = shuffleArray(groupArrays); 
            groupArrays.sort((a, b) => b.length - a.length);

            let interleavedTeams = [];
            let maxLen = groupArrays[0].length;
            for (let i = 0; i < maxLen; i++) {
                for (let arr of groupArrays) {
                    if (i < arr.length) interleavedTeams.push(arr[i]);
                }
            }

            let seedAssignments = {};
            interleavedTeams.forEach((team, index) => { seedAssignments[index + 1] = team; });
            for (let i = interleavedTeams.length + 1; i <= N; i++) {
                seedAssignments[i] = { name: "BYE", isBye: true };
            }

            let physicalSeeds = getStandardSeeding(N);
            let finalLayout = physicalSeeds.map(seed => seedAssignments[seed]);
            finalLayout = shuffleBracketBranches(finalLayout);

            let initialRounds = [];
            let numRounds = Math.log2(N);
            
            for(let r = 0; r <= numRounds; r++) {
                let round = [];
                if (r === numRounds) {
                    round.push({ t1: null }); 
                } else {
                    let numMatches = Math.pow(2, numRounds - r - 1);
                    for(let m = 0; m < numMatches; m++) {
                        round.push({ t1: null, t2: null });
                    }
                }
                initialRounds.push(round);
            }

            for(let i = 0; i < finalLayout.length; i++) {
                if(finalLayout[i].isBye) {
                    let mIdx = Math.floor(i / 2);
                    if(i % 2 === 0) initialRounds[0][mIdx].t1 = finalLayout[i];
                    else initialRounds[0][mIdx].t2 = finalLayout[i];
                }
            }

            state.rounds = initialRounds;
            startSpinning(finalLayout, interleavedTeams);
        };

        const startSpinning = async (layout, rawTeams) => {
            state.hasGenerated = true;
            state.isSpinning = true;
            state.spinValue = "PREPARING BRACKET...";
            updateUI();
            
            let pool = [...rawTeams];
            await new Promise(r => setTimeout(r, 1000));

            for (let i = 0; i < layout.length; i++) {
                if (layout[i].isBye) continue;

                state.activeSpinIndex = i;
                const isLarge = rawTeams.length > 16;
                const iterations = isLarge ? 4 : 8;
                const spinInterval = isLarge ? 25 : 40;

                for (let s = 0; s < iterations; s++) {
                    let randomTeam = pool[Math.floor(Math.random() * pool.length)];
                    state.spinValue = randomTeam.name;
                    updateUI(); // Quick re-render for spinning text/glow
                    await new Promise(r => setTimeout(r, spinInterval));
                }

                state.spinValue = layout[i].name;
                await new Promise(r => setTimeout(r, isLarge ? 150 : 300));

                // Assign team to layout
                const mIdx = Math.floor(i / 2);
                if (i % 2 === 0) state.rounds[0][mIdx].t1 = layout[i];
                else state.rounds[0][mIdx].t2 = layout[i];

                pool = pool.filter(t => t.name !== layout[i].name);
                updateUI();
            }

            // Auto-advance BYEs (using Deep Copy logic)
            let finalTree = JSON.parse(JSON.stringify(state.rounds));
            finalTree[0].forEach((match, mIdx) => {
                const nextMatchIndex = Math.floor(mIdx / 2);
                const isTopSlot = mIdx % 2 === 0;

                if (match.t1?.isBye && match.t2 && !match.t2.isBye) {
                    if (isTopSlot) finalTree[1][nextMatchIndex].t1 = match.t2;
                    else finalTree[1][nextMatchIndex].t2 = match.t2;
                } else if (match.t2?.isBye && match.t1 && !match.t1.isBye) {
                    if (isTopSlot) finalTree[1][nextMatchIndex].t1 = match.t1;
                    else finalTree[1][nextMatchIndex].t2 = match.t1;
                }
            });
            
            state.rounds = finalTree;
            state.isSpinning = false;
            state.activeSpinIndex = -1;
            state.spinValue = "DRAW COMPLETE!";
            updateUI();
        };

        window.handleAdvance = (rIdx, mIdx, slotId) => {
            if (state.isSpinning) return;
            const team = state.rounds[rIdx][mIdx][slotId];
            if (!team || team.isBye) return;
            if (rIdx >= state.rounds.length - 1) return;

            let nextTree = JSON.parse(JSON.stringify(state.rounds));
            const nextRIdx = rIdx + 1;
            
            if (nextRIdx === nextTree.length - 1) {
                nextTree[nextRIdx][0].t1 = team;
            } else {
                const nextMIdx = Math.floor(mIdx / 2);
                const isTopSlot = mIdx % 2 === 0;
                
                if (isTopSlot) nextTree[nextRIdx][nextMIdx].t1 = team;
                else nextTree[nextRIdx][nextMIdx].t2 = team;
            }
            
            state.rounds = nextTree;
            updateUI();
        };

        // Initialize UI on load
        updateUI();

    </script>
