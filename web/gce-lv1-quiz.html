    }
    /* Prevent text selection on buttons */

      user-select: none;
    }
  </style>

    // --- State ---
    let appState = 'menu'; // menu, quiz, results
    let mode = 'normal'; // normal, challenge
    let questionsToAsk = [];
    let currentQIndex = 0;
    let selectedOptions = [];
    let hasSubmitted = false;
    let showHint = false;
    let wrongQuestions = [];
    let score = 0;
    let feedbackMsg = '';
    let isCorrect = false;
    let timeLeft = 30;
    let timerInterval = null;

    // --- DOM Elements ---
    const appContainer = document.getElementById('app');

    // --- Core Logic Functions ---
    function startQuiz(selectedMode) {
      mode = selectedMode;
      appState = 'quiz';
      questionsToAsk = [...quizData];
      currentQIndex = 0;
      wrongQuestions = [];
      score = 0;
      resetQuestionState();
      render();
    }

    function resetQuestionState() {
      selectedOptions = [];
      hasSubmitted = false;
      showHint = false;
      timeLeft = 30;
      manageTimer();
    }

    function manageTimer() {
      clearInterval(timerInterval);
      if (appState === 'quiz' && mode === 'challenge' && !hasSubmitted) {
        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            checkAnswer(true);
          } else {
            // Update just the timer if possible, or re-render
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
              timerEl.innerHTML = `<i data-lucide="clock" class="w-4 h-4 inline"></i> ${timeLeft}s`;
              if (timeLeft <= 10) {
                timerEl.className = "flex items-center gap-2 font-bold px-4 py-2 rounded-full bg-red-100 text-red-600";
              }
              lucide.createIcons();
            }
          }
        }, 1000);
      }
    }

    function handleOptionToggle(index) {
      if (hasSubmitted) return;
      const currentQ = questionsToAsk[currentQIndex];
      const isMultiSelect = currentQ.correctAnswers.length > 1;

      if (isMultiSelect) {
        if (selectedOptions.includes(index)) {
          selectedOptions = selectedOptions.filter(i => i !== index);
        } else {
          selectedOptions.push(index);
        }
      } else {
        selectedOptions = [index];
      }
      render();
    }

    function checkAnswer(forced = false) {
      if (selectedOptions.length === 0 && !forced) return;
      
      const currentQ = questionsToAsk[currentQIndex];
      clearInterval(timerInterval);
      
      const isAnsCorrect = 
        currentQ.correctAnswers.length === selectedOptions.length &&
        currentQ.correctAnswers.every(ans => selectedOptions.includes(ans));

      isCorrect = isAnsCorrect;
      
      if (isAnsCorrect) {
        if (!forced) score++;
        feedbackMsg = getRandomPhrase(correctMotivations) + " That is the right answer.";
      } else {
        feedbackMsg = getRandomPhrase(incorrectMotivations) + " Let's review this again later.";
        // Add to wrong questions if not already there
        if (!wrongQuestions.some(q => q.question === currentQ.question)) {
          wrongQuestions.push(currentQ);
        }
      }

      hasSubmitted = true;
      render();
    }

    function toggleHint() {
      showHint = true;
      render();
    }

    function nextQuestion() {
      if (currentQIndex < questionsToAsk.length - 1) {
        currentQIndex++;
        resetQuestionState();
      } else {
        appState = 'results';
      }
      render();
    }

    function startAdaptiveReview() {
      questionsToAsk = [...wrongQuestions];
      wrongQuestions = [];
      currentQIndex = 0;
      appState = 'quiz';
      resetQuestionState();
      render();
    }

    function returnToMenu() {
      appState = 'menu';
      render();
    }

                <button onclick="startQuiz('normal')" class="flex flex-col items-center justify-center p-6 border-2 border-blue-100 hover:border-blue-500 hover:bg-blue-50 rounded-xl transition-all">

                  <h3 class="text-lg font-bold text-gray-800">Normal Mode</h3>
                  <p class="text-sm text-gray-500 text-center mt-2">Take your time, use hints, and learn at your own pace.</p>
                </button>

                <button onclick="startQuiz('challenge')" class="flex flex-col items-center justify-center p-6 border-2 border-orange-100 hover:border-orange-500 hover:bg-orange-50 rounded-xl transition-all">
                  <i data-lucide="clock" class="w-10 h-10 text-orange-500 mb-4"></i>
                  <h3 class="text-lg font-bold text-gray-800">Challenge Mode</h3>
                  <p class="text-sm text-gray-500 text-center mt-2">30 seconds per question. Think fast!</p>

    function renderResults() {

      const isPerfect = wrongQuestions.length === 0;

      let extraContent = '';

            <button onclick="startAdaptiveReview()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-lg transition-colors">

            </button>
          </div>
        `;

        extraContent = `

            <p class="text-green-700">You've mastered all the questions in this set.</p>

      }

      return `

          <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl p-8 text-center">
            <i data-lucide="trophy" class="w-16 h-16 mx-auto mb-6 ${isPerfect ? 'text-yellow-500' : 'text-blue-500'}"></i>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Quiz Complete!</h2>
            <p class="text-lg text-gray-600 mb-8">
              You scored <span class="font-bold text-blue-600">${score}</span> out of ${totalCurrentQs} on this round.

            ${extraContent}

      let timerUI = '';
      if (mode === 'challenge') {
        const timerClass = timeLeft <= 10 ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600';
        timerUI = `
          <div id="timer-display" class="flex items-center gap-2 font-bold px-4 py-2 rounded-full ${timerClass}">
            <i data-lucide="clock" class="w-4 h-4"></i> ${timeLeft}s
          </div>
        `;
      }

      // Options
      const optionsHtml = currentQ.options.map((option, idx) => {
        const isSelected = selectedOptions.includes(idx);
        const isCorrectAns = currentQ.correctAnswers.includes(idx);
        
        let btnStyle = "border-gray-200 hover:border-blue-400 hover:bg-blue-50";
        if (isSelected) btnStyle = "border-blue-500 bg-blue-50";
        
        if (hasSubmitted) {
          if (isCorrectAns) {
            btnStyle = "border-green-500 bg-green-50 font-medium text-green-800";
          } else if (isSelected && !isCorrectAns) {
            btnStyle = "border-red-400 bg-red-50 text-red-800 opacity-70";
          } else {
            btnStyle = "border-gray-200 opacity-50";
          }
        }

        const iconHtml = isSelected ? '<i data-lucide="check" class="w-4 h-4"></i>' : '';
        const boxStyle = isSelected ? 'border-blue-500 bg-blue-500 text-white' : 'border-gray-300';

        return `
          <button onclick="handleOptionToggle(${idx})" ${hasSubmitted ? 'disabled' : ''} class="w-full text-left p-4 rounded-xl border-2 transition-all flex items-start gap-4 ${btnStyle}">
            <div class="shrink-0 w-6 h-6 mt-0.5 rounded flex items-center justify-center border ${boxStyle}">
              ${iconHtml}
            </div>
            <span class="text-gray-700 leading-relaxed">${option}</span>
          </button>
        `;
      }).join('');

      // Controls/Feedback
      let controlsHtml = '';
      if (!hasSubmitted) {
        controlsHtml = `
          <button onclick="toggleHint()" class="flex items-center gap-2 text-yellow-600 font-medium hover:bg-yellow-50 px-4 py-2 rounded-lg transition-colors">
            <i data-lucide="lightbulb" class="w-5 h-5"></i> 
            Need a hint?
          </button>
          <button onclick="checkAnswer(false)" ${selectedOptions.length === 0 ? 'disabled class="bg-gray-300 cursor-not-allowed text-white font-bold py-3 px-8 rounded-xl w-full sm:w-auto"' : 'class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-colors w-full sm:w-auto"'}>
            Submit Answer
          </button>
        `;
      } else {
        const feedbackIcon = isCorrect 
          ? '<i data-lucide="check-circle" class="w-7 h-7 text-green-500 shrink-0"></i>' 
          : '<i data-lucide="x-circle" class="w-7 h-7 text-red-500 shrink-0"></i>';
        const feedbackClass = isCorrect ? 'text-green-700' : 'text-red-700';
        
        controlsHtml = `
          <div class="w-full flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full sm:w-auto">
              ${feedbackIcon}
              <p class="font-semibold ${feedbackClass}">${feedbackMsg}</p>
            </div>
            <button onclick="nextQuestion()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-xl transition-colors w-full sm:w-auto flex items-center justify-center gap-2">
              Next <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
          </div>
        `;
      }

      // Hint Display
      let hintHtml = '';
      if (showHint && !hasSubmitted) {
        hintHtml = `
          <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 flex gap-3 animate-fade-in mb-6">
            <i data-lucide="lightbulb" class="w-5 h-5 text-yellow-600 shrink-0"></i>
            <p class="text-yellow-800">${currentQ.hint}</p>
          </div>
        `;
      }

      const multiSelectLabel = isMultiSelect ? `<p class="text-blue-600 text-sm font-semibold mb-6 uppercase tracking-wider bg-blue-50 inline-block px-3 py-1 rounded-md">Select ${currentQ.correctAnswers.length} correct answers</p>` : '';

      return `
        <div class="py-8 px-4 w-full h-full min-h-screen">
          <div class="max-w-3xl mx-auto mt-4">
            <!-- Header -->
            <div class="flex justify-between items-center mb-6">
              <div class="text-sm font-bold text-gray-500 uppercase tracking-wider">
                Question ${currentQIndex + 1} of ${questionsToAsk.length}
              </div>
              ${timerUI}
            </div>

            <!-- Question Card -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-6">
              <div class="p-6 md:p-8">
                <h2 class="text-xl md:text-2xl font-semibold text-gray-800 mb-4 leading-relaxed">
                  ${currentQ.question}
                </h2>
                ${multiSelectLabel}

                <div class="space-y-3">
                  ${optionsHtml}
                </div>
              </div>

              <!-- Controls & Feedback -->
              <div class="bg-gray-50 border-t border-gray-100 p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                ${controlsHtml}
              </div>
            </div>

            ${hintHtml}
          </div>
        </div>
      `;
    }

    // --- Main Render Setup ---
    function render() {
      let html = '';
      if (appState === 'menu') html = renderMenu();
      else if (appState === 'quiz') html = renderQuiz();
      else if (appState === 'results') html = renderResults();

      appContainer.innerHTML = html;
      
      // Initialize Lucide icons on the newly injected HTML
      if (window.lucide) {
        lucide.createIcons();
      }
    }

    // Initial render
    render();
  </script>
</body>
</html>
