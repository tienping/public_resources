<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Custom Color Picker Styling */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 8px;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
        }
        
        /* Ensure QR code scales beautifully within its box */
        #qrcode {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 16px;
            box-sizing: border-box;
            border-radius: 1rem;
            transition: background-color 0.3s ease;
        }
        #qrcode img, #qrcode canvas {
            width: 100% !important;
            height: auto !important;
            border-radius: 0.5rem;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-slate-50 to-purple-50 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- Main Container -->
    <div class="max-w-4xl w-full bg-white rounded-[2rem] shadow-2xl shadow-indigo-100/50 overflow-hidden flex flex-col md:flex-row border border-slate-100/60">
        
        <!-- Left Panel: Input, Preview & Download -->
        <div class="w-full md:w-[55%] p-8 lg:p-10 flex flex-col bg-white relative border-b md:border-b-0 md:border-r border-slate-100">
            
            <h1 class="text-2xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <div class="p-2 bg-indigo-100 rounded-lg text-indigo-600">
                    <i data-lucide="qr-code" class="w-6 h-6"></i>
                </div>
                QRGEN
            </h1>
            <p class="text-slate-500 mb-4 text-sm font-medium italic">Used by Cg Lim.</p>

            <!-- Content Input -->
            <div class="mb-3 w-full">
                <label class="block text-sm font-semibold text-slate-700 mb-2">URL or Text</label>
                <textarea id="url-input" rows="3" placeholder="https://example.com" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all resize-none text-slate-700 shadow-sm"></textarea>
            </div>

            <!-- Download Action -->
            <button id="download-btn" disabled class="mb-3 w-full bg-slate-900 hover:bg-indigo-600 text-white font-semibold py-3.5 px-8 rounded-xl shadow-xl shadow-slate-200 hover:shadow-indigo-200 transition-all duration-300 flex items-center justify-center gap-2 opacity-50 cursor-not-allowed group active:scale-95">
                <i data-lucide="download" class="w-5 h-5 group-hover:-translate-y-0.5 transition-transform"></i>
                Download PNG
            </button>

            <!-- QR Code Display Box -->
            <div class="bg-slate-50 mx-auto w-full max-w-[280px] aspect-square rounded-[1.5rem] flex items-center justify-center p-4 relative overflow-hidden shadow-inner border-2 border-slate-100 transition-all duration-300" id="qr-wrapper">
                
                <!-- Placeholder State -->
                <div id="placeholder" class="text-center text-slate-400 absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-300">
                    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-4 shadow-sm border border-slate-200/50">
                        <i data-lucide="qr-code" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p class="text-sm font-medium">Enter content to see preview</p>
                </div>
                
                <!-- Active QR Code -->
                <div id="qrcode" class="opacity-0 transition-opacity duration-500 relative z-10 scale-95 origin-center"></div>
            </div>
        </div>

        <!-- Right Panel: Controls -->
        <div class="w-full md:w-[45%] p-8 lg:p-10 bg-slate-50/30 flex flex-col">
            
            <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="settings-2" class="w-5 h-5 text-indigo-500"></i>
                Appearance
            </h3>

            <div class="space-y-6">
                <!-- Color Pickers -->
                <div class="grid grid-cols-2 gap-6 p-5 bg-white rounded-xl border border-slate-100 shadow-sm">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Foreground</label>
                        <div class="flex items-center gap-3">
                            <input type="color" id="fg-color" value="#0f172a">
                            <span class="text-sm text-slate-600 font-mono bg-slate-50 px-2 py-1 rounded border border-slate-100" id="fg-hex">#0f172a</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Background</label>
                        <div class="flex items-center gap-3">
                            <input type="color" id="bg-color" value="#ffffff">
                            <span class="text-sm text-slate-600 font-mono bg-slate-50 px-2 py-1 rounded border border-slate-100" id="bg-hex">#ffffff</span>
                        </div>
                    </div>
                </div>
                
                <!-- Error Correction -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2 flex items-center justify-between">
                        Error Correction
                        <span class="text-xs font-normal text-slate-400">Determines damage resistance</span>
                    </label>
                    <div class="relative">
                        <select id="correction-level" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-slate-700 appearance-none bg-white font-medium shadow-sm cursor-pointer">
                            <option value="L">Low (7%) - Best for small codes</option>
                            <option value="M">Medium (15%) - Standard</option>
                            <option value="Q">Quartile (25%) - Good for readability</option>
                            <option value="H" selected>High (30%) - Most reliable</option>
                        </select>
                        <i data-lucide="chevron-down" class="w-4 h-4 absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="copyrightFooter" onclick="handleCopyrightClick()" class="mt-8 cursor-pointer select-none py-4 text-slate-400 text-xs font-medium tracking-widest uppercase hover:text-slate-600 transition-colors">
        © TienPing @ 2026
    </footer>

    <!-- Hidden Info Modal -->
    <div id="infoModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full border border-slate-100 scale-90 transition-transform duration-300 transform opacity-0" id="modalContent">
            <div class="text-center">
                <div class="w-16 h-16 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">👨‍🏫</div>
                <h3 class="text-xl font-extrabold text-slate-900 mb-2">Lim Tien Ping</h3>
                <div class="space-y-2 mb-6">
                    <p class="text-slate-500 text-sm font-medium break-all">petwesley@gmail.com</p>
                    <p class="text-slate-500 text-sm font-medium break-all">g-39576509@moe-dl.edu.my</p>
                </div>
                <button onclick="closeInfoModal()" class="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-all">Close</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 z-50">
        <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
        <span id="toast-msg" class="text-sm font-medium"></span>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // DOM Elements
        const urlInput = document.getElementById('url-input');
        const fgColor = document.getElementById('fg-color');
        const bgColor = document.getElementById('bg-color');
        const fgHex = document.getElementById('fg-hex');
        const bgHex = document.getElementById('bg-hex');
        const correctionLevel = document.getElementById('correction-level');
        const qrContainer = document.getElementById('qrcode');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('download-btn');
        const qrWrapper = document.getElementById('qr-wrapper');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-msg');
        
        // Easter Egg Elements
        const infoModal = document.getElementById('infoModal');
        const modalContent = document.getElementById('modalContent');

        let debounceTimer;
        let toastTimeout;
        let clickTimes = [];

        // Easter Egg Logic
        function handleCopyrightClick() {
            const now = Date.now();
            clickTimes.push(now);
            clickTimes = clickTimes.filter(t => now - t < 2000);
            if (clickTimes.length >= 8) {
                showInfoModal();
                clickTimes = [];
            }
        }

        function showInfoModal() {
            infoModal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-90', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeInfoModal() {
            modalContent.classList.add('scale-90', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                infoModal.classList.add('hidden');
            }, 300);
        }

        // Sync Color Hex Labels
        function updateHexLabels() {
            fgHex.innerText = fgColor.value;
            bgHex.innerText = bgColor.value;
        }

        // Show Toast Utility
        function showToast(message) {
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 4000);
        }

        // Generate QR Code Logic
        function generateQR() {
            const text = urlInput.value.trim();
            
            if (!text) {
                // Reset to placeholder state
                qrContainer.classList.add('opacity-0');
                qrContainer.classList.remove('scale-100');
                qrContainer.classList.add('scale-95');
                qrContainer.style.backgroundColor = 'transparent';
                placeholder.classList.remove('opacity-0');
                
                downloadBtn.disabled = true;
                downloadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                downloadBtn.classList.remove('hover:bg-indigo-600', 'hover:shadow-indigo-200');
                
                qrWrapper.classList.replace('bg-white', 'bg-slate-50');
                return;
            }

            // Hide placeholder and clear old QR
            placeholder.classList.add('opacity-0');
            qrContainer.innerHTML = '';
            
            try {
                // We generate a high-res 512x512 image for a crisp download.
                // CSS max-width scales it beautifully into the preview box.
                new QRCode(qrContainer, {
                    text: text,
                    width: 512,
                    height: 512,
                    colorDark : fgColor.value,
                    colorLight : bgColor.value,
                    correctLevel : QRCode.CorrectLevel[correctionLevel.value]
                });
                
                qrContainer.style.backgroundColor = bgColor.value;
                qrWrapper.classList.replace('bg-slate-50', 'bg-white');

                // Add slight delay to allow rendering before fading in
                setTimeout(() => {
                    qrContainer.classList.remove('opacity-0', 'scale-95');
                    qrContainer.classList.add('opacity-100', 'scale-100');
                    
                    downloadBtn.disabled = false;
                    downloadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    downloadBtn.classList.add('hover:bg-indigo-600', 'hover:shadow-indigo-200');
                }, 50);
                
            } catch (e) {
                console.error(e);
                showToast("Text is too long for the selected Error Correction level.");
            }
        }

        // Handle Download Action
        function downloadQR() {
            if (downloadBtn.disabled) return;

            const canvas = qrContainer.querySelector('canvas');
            const img = qrContainer.querySelector('img');
            
            const sourceElement = canvas || img;

            if (!sourceElement) {
                showToast("Could not find generated QR code.");
                return;
            }

            // Create a temporary canvas to add the frame/padding
            const padding = 40; // 40px padding for the frame
            const tempCanvas = document.createElement('canvas');
            const srcWidth = sourceElement.width || 512;
            const srcHeight = sourceElement.height || 512;

            tempCanvas.width = srcWidth + (padding * 2);
            tempCanvas.height = srcHeight + (padding * 2);
            
            const ctx = tempCanvas.getContext('2d');
            
            // Fill the padded area with the background color
            ctx.fillStyle = bgColor.value;
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            
            // Draw original QR Code in the center
            ctx.drawImage(sourceElement, padding, padding, srcWidth, srcHeight);

            const imageSrc = tempCanvas.toDataURL("image/png");

            if (imageSrc) {
                const link = document.createElement('a');
                link.href = imageSrc;
                // Generate a smart filename based on a snippet of the input
                const safeName = urlInput.value.trim().substring(0, 15).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `qr_${safeName || 'code'}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                showToast("Could not generate image data for download.");
            }
        }

        // Event Listeners
        urlInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            // 300ms debounce for typing smoothness
            debounceTimer = setTimeout(generateQR, 300);
        });

        [fgColor, bgColor].forEach(input => {
            input.addEventListener('input', () => {
                updateHexLabels();
                // We use a small timeout to avoid lagging on color drag
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(generateQR, 50);
            });
        });

        correctionLevel.addEventListener('change', generateQR);
        downloadBtn.addEventListener('click', downloadQR);

    </script>
</body>
</html>
