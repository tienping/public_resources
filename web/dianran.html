<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>点燃：回忆之光 - 深夜房间版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #eee;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .start-screen, .pause-screen {
            pointer-events: auto;
            background: rgba(10, 10, 10, 0.9);
            padding: 3rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #442211;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }
        .score-board {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 20px;
            font-weight: 200;
            color: #d69e2e;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .score-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .mode-badge {
            font-size: 12px;
            background: rgba(214, 158, 46, 0.1);
            border: 1px solid rgba(214, 158, 46, 0.3);
            padding: 2px 8px;
            border-radius: 12px;
            color: #b7791f;
        }
        .pause-btn {
            pointer-events: auto;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #666;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .pause-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="https://hukaizhe534-cell.github.io/burn/dianran.mp3" type="audio/mpeg">
    </audio>

    <div class="ui-overlay">
        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <h1 id="secretTrigger" class="text-5xl font-black mb-2 text-orange-800 tracking-tighter">点燃</h1>
            <p class="mb-8 text-gray-500 text-xs tracking-[0.5em]">ROOM OF LOST MEMORIES</p>
            <div class="mb-8 text-sm text-gray-400 leading-relaxed">
                <p>在这个静谧的房间里，点燃那些曾经的过去。</p>
                <p class="mt-4 text-xs text-orange-900">按下 D, F, J, K 键 或 点击对应轨道 点燃</p>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center mt-2">
                <button id="startObserveBtn" class="bg-stone-900 hover:bg-stone-800 text-stone-400 border border-stone-700 px-8 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    观赏模式 (随机)
                </button>
                <button id="startRhythmBtn" class="bg-orange-950 hover:bg-orange-900 text-orange-600 border border-orange-800 px-8 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    节奏模式 (曲谱)
                </button>
            </div>
        </div>

        <!-- 暂停界面 -->
        <div id="pauseScreen" class="pause-screen hidden">
            <h2 class="text-3xl font-bold mb-6 text-orange-700">思绪停滞</h2>
            <p class="text-gray-400 mb-8 text-sm">火光暂时熄灭，但回忆仍在门外徘徊。</p>
            <div class="flex flex-col gap-4 w-full">
                <button id="resumeBtn" class="bg-stone-900 hover:bg-orange-950 text-orange-700 border border-orange-900 px-12 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    继续点燃
                </button>
                <button id="showRhythmBtn" class="bg-stone-900 hover:bg-yellow-950 text-yellow-600 border border-yellow-900 px-12 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto hidden">
                    显示/导出节奏谱
                </button>
                <button id="quitBtn" class="bg-transparent hover:bg-stone-900 text-stone-500 hover:text-stone-300 border border-stone-800 px-12 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    退出模式选择
                </button>
            </div>
        </div>

        <!-- 隐藏界面 (开发者/参数调整) -->
        <div id="secretScreen" class="pause-screen hidden">
            <h2 class="text-2xl font-bold mb-4 text-red-700 tracking-widest border-b border-red-900 pb-2 inline-block">DEBUG MODE</h2>
            <div class="flex flex-col gap-4 text-left text-sm text-gray-300 w-64 mx-auto mb-6 mt-4 pointer-events-auto">
                <div class="flex justify-between items-center">
                    <label>下落速度 (Speed):</label>
                    <input type="number" id="cfgSpeed" class="w-16 bg-stone-900 border border-stone-700 rounded px-1 text-center text-orange-500 outline-none focus:border-red-700" step="0.5">
                </div>
                <div class="flex justify-between items-center">
                    <label>节拍速度 (BPM):</label>
                    <input type="number" id="cfgBpm" class="w-16 bg-stone-900 border border-stone-700 rounded px-1 text-center text-orange-500 outline-none focus:border-red-700" step="1">
                </div>
                <div class="flex justify-between items-center">
                    <label>判定区间 (Hit Win):</label>
                    <input type="number" id="cfgHitWin" class="w-16 bg-stone-900 border border-stone-700 rounded px-1 text-center text-orange-500 outline-none focus:border-red-700" step="5">
                </div>
                <div class="flex justify-between items-center">
                    <label>火花数量 (Particles):</label>
                    <input type="number" id="cfgParticles" class="w-16 bg-stone-900 border border-stone-700 rounded px-1 text-center text-orange-500 outline-none focus:border-red-700" step="10">
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button id="closeSecretBtn" class="bg-stone-900 hover:bg-red-950 text-red-600 border border-red-900 px-12 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    应用并关闭
                </button>
                <button id="startEditBtn" class="bg-stone-900 hover:bg-purple-950 text-purple-500 border border-purple-900 px-12 py-3 rounded-sm font-bold transition-all transform hover:scale-105 pointer-events-auto">
                    开启编辑模式 (打谱)
                </button>
            </div>
        </div>

        <!-- 节奏谱输出界面 -->
        <div id="rhythmOutputScreen" class="pause-screen hidden">
            <h2 class="text-2xl font-bold mb-4 text-yellow-600">导出的节奏谱</h2>
            <p class="text-gray-400 mb-4 text-xs">全选并复制下方文本。你可以用它替换代码中的 <code>RHYTHM_MAP</code></p>
            <textarea id="rhythmOutputText" class="w-80 h-32 bg-stone-900 text-yellow-500 p-3 border border-yellow-900 rounded text-sm mb-6 outline-none resize-none pointer-events-auto font-mono" readonly></textarea>
            <br>
            <button id="closeRhythmOutputBtn" class="bg-stone-900 hover:bg-yellow-950 text-yellow-600 border border-yellow-900 px-12 py-3 rounded-sm font-bold transition-all pointer-events-auto">
                返回暂停菜单
            </button>
        </div>

        <div id="scoreBoard" class="score-board hidden">
            <div class="score-row">
                <button id="pauseBtn" class="pause-btn">PAUSE</button>
                <span class="cursor-pointer select-none transition-colors hover:text-orange-400" title="?">点燃: <span id="scoreVal">0</span></span>
            </div>
            <div id="modeDisplay" class="mode-badge">节奏模式</div>
        </div>
        
        <div class="absolute bottom-3 w-full text-center text-[10px] md:text-xs text-stone-600 pointer-events-auto font-sans tracking-wider">
            Credited to hukaizhe534 for the original idea @ 
            <a href="https://hukaizhe534-cell.github.io/burn/memoryindex.html" target="_blank" rel="noopener noreferrer" class="text-orange-900 hover:text-orange-600 underline transition-colors">
                https://hukaizhe534-cell.github.io/burn/memoryindex.html
            </a>
        </div>
    </div>

    <script>
        const CONFIG = {
            trackXs: [],      // 4 条轨道的 X 坐标
            hitY: 600,
            hitWindow: 90,    
            noteSpeed: 4.5,   
            bpm: 75,          
            particleCount: 40,
            countPerBeat: 4
        };

        // 定义节奏谱 (横杠代表空拍，每个数字代表对应轨道的单点)
        const RHYTHM_MAP = "-------------1234------------1-1-------1--2-3-4-4---4-3-2--1--2-1-------3---4---3---3-3-3----1-2-1--1--11--------1---2--3---4---3---2--1-------1-1--1-2-----3--4-4-4-4-4-------1-2--1-2-----3-3---4--------1-2-3-----34----1-2-1-21-2-3---4---1-2---3-4----3---2---2---1------1-2---1-2-----1-23-4-3-2-1------1-2---1-2---3--3-4--3-------1-2-1--1--2-1---1-2-3-4-3-2-1---2---3-4---3-4----3--4--44-4--44-4-4-4-4-4------1-2---1---2-2-2-2---2-2---12-2-1-2-2-2-3-----3-4--3--2-------1-2-1-2-3---4---4-3-2-1-2---3-------4-3-2-1---1-2----1--2-------1-2--1---2-3-4--34-3-4-3-4-3------1-2-1-2-3---4-32--1---2-------1-2-3-4-4---4---1-2-3-4-4---4-------1-2-3-4---1-2--------1----2-3------4-3---2--1---1-2-3-4--3--2--1";
        const mapTokens = RHYTHM_MAP.split(''); // 每个字符算作一拍
        let currentMapIndex = 0;
        let playMode = 'OBSERVE'; // 'OBSERVE', 'RHYTHM', 或 'EDIT'

        // 预加载回忆照片
        const imageUrls = [
            "https://tienping.github.io/public_resources/dianran/1.webp",
            "https://tienping.github.io/public_resources/dianran/2.webp",
            "https://tienping.github.io/public_resources/dianran/3.webp",
            "https://tienping.github.io/public_resources/dianran/4.webp",
            "https://tienping.github.io/public_resources/dianran/5.webp",
            "https://tienping.github.io/public_resources/dianran/6.webp",
            "https://tienping.github.io/public_resources/dianran/7.webp",
            "https://tienping.github.io/public_resources/dianran/8.webp",
            "https://tienping.github.io/public_resources/dianran/9.webp",
            "https://tienping.github.io/public_resources/dianran/10.webp",
            "https://tienping.github.io/public_resources/dianran/11.webp",
            "https://tienping.github.io/public_resources/dianran/12.webp",
            "https://tienping.github.io/public_resources/dianran/13.webp",
            "https://tienping.github.io/public_resources/dianran/14.webp",
            "https://tienping.github.io/public_resources/dianran/15.webp",
            "https://tienping.github.io/public_resources/dianran/16.webp",
            "https://tienping.github.io/public_resources/dianran/17.webp"
        ];
        const preloadedImages = [];
        imageUrls.forEach(url => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = url;
            preloadedImages.push(img);
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const pauseScreen = document.getElementById('pauseScreen');
        
        const startObserveBtn = document.getElementById('startObserveBtn');
        const startRhythmBtn = document.getElementById('startRhythmBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const showRhythmBtn = document.getElementById('showRhythmBtn');
        const quitBtn = document.getElementById('quitBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        
        const scoreBoard = document.getElementById('scoreBoard');
        const scoreVal = document.getElementById('scoreVal');
        const modeDisplay = document.getElementById('modeDisplay');
        const bgMusic = document.getElementById('bgMusic');

        // 隐藏界面相关的 DOM 和变量
        const secretTrigger = document.getElementById('secretTrigger');
        const secretScreen = document.getElementById('secretScreen');
        const closeSecretBtn = document.getElementById('closeSecretBtn');
        const startEditBtn = document.getElementById('startEditBtn');
        const cfgSpeed = document.getElementById('cfgSpeed');
        const cfgBpm = document.getElementById('cfgBpm');
        const cfgHitWin = document.getElementById('cfgHitWin');
        const cfgParticles = document.getElementById('cfgParticles');
        
        // 节奏输出相关的 DOM
        const rhythmOutputScreen = document.getElementById('rhythmOutputScreen');
        const rhythmOutputText = document.getElementById('rhythmOutputText');
        const closeRhythmOutputBtn = document.getElementById('closeRhythmOutputBtn');
        
        let secretClickTimestamps = [];
        let wasPlayingBeforeSecret = false;
        
        // 打谱系统变量
        let recordedBeats = {};
        let recordStartTime = 0;

        let gameState = 'START';
        let score = 0;
        let notes = [];
        let particles = [];
        let dustParticles = []; 
        let floatingPhotos = [];
        let lastNoteTime = 0;
        let pauseStartTime = 0; 
        let audioCtx;
        
        let lighters = [
            { flameTime: 0, angle: 0 },
            { flameTime: 0, angle: 0 },
            { flameTime: 0, angle: 0 },
            { flameTime: 0, angle: 0 }
        ];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const trackWidth = Math.min(80, canvas.width / 6);
            
            CONFIG.trackXs = [
                trackWidth,                      // D (1)
                trackWidth * 2.2,                // F (2)
                canvas.width - trackWidth * 2.2, // J (3)
                canvas.width - trackWidth        // K (4)
            ];
            
            CONFIG.hitY = canvas.height * 0.85;
            initDust();
        }

        function initDust() {
            dustParticles = [];
            for(let i=0; i<50; i++) {
                dustParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5
                });
            }
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.6) * 6; 
                this.vy = (Math.random() - 0.8) * 8 - 2;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.015;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Note {
            constructor(trackIndex) {
                this.track = trackIndex;
                this.y = -150; 
                this.w = 60; 
                this.h = 80;
                this.active = true;
                this.rotation = (Math.random() - 0.5) * 0.15;
                this.image = preloadedImages[Math.floor(Math.random() * preloadedImages.length)];
            }

            get x() {
                return CONFIG.trackXs[this.track];
            }

            update() {
                this.y += CONFIG.noteSpeed;
                if (this.y > canvas.height + 150) {
                    this.active = false;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.fillStyle = '#e2e2d2';
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                const p = 4;
                
                ctx.fillStyle = '#111';
                ctx.fillRect(-this.w/2 + p, -this.h/2 + p, this.w - p*2, this.h - p*4);
                
                if (this.image && this.image.complete && this.image.naturalHeight !== 0) {
                    const dx = -this.w/2 + p;
                    const dy = -this.h/2 + p;
                    const dw = this.w - p*2;
                    const dh = this.h - p*4;
                    
                    const iw = this.image.naturalWidth;
                    const ih = this.image.naturalHeight;
                    
                    const r = Math.max(dw / iw, dh / ih);
                    const sw = dw / r;
                    const sh = dh / r;
                    const sx = (iw - sw) / 2;
                    const sy = (ih - sh) / 2;
                    
                    ctx.drawImage(this.image, sx, sy, sw, sh, dx, dy, dw, dh);
                }
                
                ctx.restore();
            }
        }

        class FloatingPhoto {
            constructor(x, y, rotation, image) {
                this.x = x;
                this.y = y;
                this.w = 60;
                this.h = 80;
                this.rotation = rotation;
                this.image = image;
                this.scale = 1;
                
                const maxScale = (canvas.height * 0.7) / this.h;
                this.targetScale = Math.min(8, maxScale); 
                
                this.opacity = 1;
                this.targetX = canvas.width / 2; 
                this.targetY = canvas.height * 0.3;
                this.lifeFrames = 0;
                
                this.rotationSpeed = (this.x < canvas.width / 2) ? 0.001 : -0.001;
            }

            update() {
                this.x += (this.targetX - this.x) * 0.05;
                this.y += (this.targetY - this.y) * 0.05;
                this.scale += (this.targetScale - this.scale) * 0.05;
                
                this.lifeFrames++;
                if (this.lifeFrames > 60) {
                    this.opacity -= 0.004;
                }
                
                this.rotation += this.rotationSpeed;
            }

            draw() {
                if (this.opacity <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);
                ctx.globalAlpha = this.opacity;
                
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(0,0,0,${0.8 * this.opacity})`;
                ctx.fillStyle = '#e2e2d2';
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                const p = 4;
                
                ctx.fillStyle = '#111';
                ctx.fillRect(-this.w/2 + p, -this.h/2 + p, this.w - p*2, this.h - p*4);
                
                if (this.image && this.image.complete && this.image.naturalHeight !== 0) {
                    const dx = -this.w/2 + p;
                    const dy = -this.h/2 + p;
                    const dw = this.w - p*2;
                    const dh = this.h - p*4;
                    
                    const iw = this.image.naturalWidth;
                    const ih = this.image.naturalHeight;
                    
                    const r = Math.max(dw / iw, dh / ih);
                    const sw = dw / r;
                    const sh = dh / r;
                    const sx = (iw - sw) / 2;
                    const sy = (ih - sh) / 2;
                    
                    ctx.drawImage(this.image, sx, sy, sw, sh, dx, dy, dw, dh);
                }
                
                ctx.restore();
            }
        }

        function drawRoom() {
            const w = canvas.width;
            const h = canvas.height;
            const wallGrad = ctx.createLinearGradient(0, 0, 0, h);
            wallGrad.addColorStop(0, '#0a0a0c');
            wallGrad.addColorStop(1, '#1a1410');
            ctx.fillStyle = wallGrad;
            ctx.fillRect(0, 0, w, h);

            const winX = w * 0.7;
            const winY = h * 0.15;
            const winW = 150;
            const winH = 250;
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(winX, winY, winW, winH);
            ctx.strokeStyle = '#050505';
            ctx.lineWidth = 8;
            ctx.strokeRect(winX, winY, winW, winH);
            ctx.beginPath();
            ctx.moveTo(winX + winW/2, winY); ctx.lineTo(winX + winW/2, winY + winH);
            ctx.moveTo(winX, winY + winH/3); ctx.lineTo(winX + winW, winY + winH/3);
            ctx.stroke();

            const shadowGrad = ctx.createLinearGradient(winX, winY+winH, winX-100, winY+winH+200);
            shadowGrad.addColorStop(0, 'rgba(30, 41, 59, 0.2)');
            shadowGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.moveTo(winX, winY+winH);
            ctx.lineTo(winX-150, h);
            ctx.lineTo(winX + winW - 150, h);
            ctx.lineTo(winX + winW, winY+winH);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            if (CONFIG.trackXs.length === 4) {
                CONFIG.trackXs.forEach(tx => {
                    ctx.fillRect(tx - 35, 0, 70, h);
                });
            }

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, h * 0.75, w, h * 0.25);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, h * 0.75, w, 10);
        }

        function drawDust() {
            ctx.fillStyle = '#fff';
            dustParticles.forEach(p => {
                if (gameState === 'PLAYING') {
                    p.x += p.speedX;
                    p.y += p.speedY;
                }
                if(p.x < 0) p.x = canvas.width;
                if(p.x > canvas.width) p.x = 0;
                if(p.y < 0) p.y = canvas.height;
                if(p.y > canvas.height) p.y = 0;
                
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop(time) {
            drawRoom();
            drawDust();

            if (gameState === 'PAUSED' || gameState === 'START') {
                notes.forEach(n => n.draw());
                floatingPhotos.forEach(f => f.draw());
                particles.forEach(p => p.draw());
                for(let i = 0; i < 4; i++) drawAnimatedLighter(i);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                requestAnimationFrame(gameLoop);
                return;
            }

            // 生成逻辑
            if (playMode !== 'EDIT') {
                const interval = playMode === 'OBSERVE' 
                    ? (60000 / CONFIG.bpm) * 2 * CONFIG.countPerBeat
                    : (60000 / CONFIG.bpm);

                if (time - lastNoteTime > (interval / CONFIG.countPerBeat)) {
                    if (playMode === 'OBSERVE') {
                        const trackIndex = Math.floor(Math.random() * 4);
                        notes.push(new Note(trackIndex));
                        playBeatSound();
                    } 
                    else if (playMode === 'RHYTHM') {
                        const token = mapTokens[currentMapIndex];
                        if (token !== '-' && token !== ' ') { 
                            const trackNum = parseInt(token);
                            if (trackNum >= 1 && trackNum <= 4) {
                                notes.push(new Note(trackNum - 1));
                                playBeatSound();
                            }
                        }
                        currentMapIndex = (currentMapIndex + 1) % mapTokens.length;
                    }
                    lastNoteTime = time;
                }
            }

            // 更新状态
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].update();
                if (!notes[i].active) notes.splice(i, 1);
            }
            for (let i = floatingPhotos.length - 1; i >= 0; i--) {
                floatingPhotos[i].update();
                if (floatingPhotos[i].opacity <= 0) floatingPhotos.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // --- 核心改动：渲染层级逻辑 ---
            if (playMode === 'RHYTHM' || playMode === 'EDIT') {
                // 节奏模式/编辑模式：轨道遮盖中间照片
                notes.forEach(n => n.draw());
                floatingPhotos.forEach(f => f.draw());
                particles.forEach(p => p.draw());
                for(let i = 0; i < 4; i++) drawAnimatedLighter(i);
            } else {
                // 观赏模式：照片遮盖轨道
                for(let i = 0; i < 4; i++) drawAnimatedLighter(i);
                notes.forEach(n => n.draw());
                floatingPhotos.forEach(f => f.draw());
                particles.forEach(p => p.draw());
            }

            requestAnimationFrame(gameLoop);
        }

        function drawAnimatedLighter(index) {
            const lx = CONFIG.trackXs[index];
            const ly = CONFIG.hitY + 50; 
            const state = lighters[index];
            
            ctx.save();
            ctx.translate(lx, ly);

            if (state.flameTime > 0) {
                state.angle = Math.min(state.angle + 0.4, Math.PI * 0.75);
                if (gameState === 'PLAYING') state.flameTime--;
                
                const ambientGlow = ctx.createRadialGradient(0, -80, 0, 0, -80, 200);
                ambientGlow.addColorStop(0, 'rgba(255, 100, 0, 0.12)');
                ambientGlow.addColorStop(1, 'transparent');
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = ambientGlow;
                ctx.beginPath();
                ctx.arc(0, -80, 200, 0, Math.PI*2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';

                const fH = 60 + Math.random() * 30;
                const fW = 12 + Math.random() * 8;
                const grad = ctx.createRadialGradient(0, -80, 0, 0, -80, fH);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.3, '#ffcc00');
                grad.addColorStop(0.6, '#ff4400');
                grad.addColorStop(1, 'transparent');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(0, -90, fW, fH, 0, 0, Math.PI*2);
                ctx.fill();
            } else {
                state.angle = Math.max(state.angle - 0.15, 0);
            }

            const bodyGrad = ctx.createLinearGradient(-22, 0, 22, 0);
            bodyGrad.addColorStop(0, '#2a2b30');   
            bodyGrad.addColorStop(0.2, '#9ba0a8'); 
            bodyGrad.addColorStop(0.5, '#4a4d54'); 
            bodyGrad.addColorStop(0.8, '#70747c'); 
            bodyGrad.addColorStop(1, '#1a1b1f');   

            ctx.fillStyle = bodyGrad;
            ctx.fillRect(-22, -50, 44, 90);
            ctx.strokeStyle = '#050505';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-22, -50, 44, 90);

            ctx.save();
            ctx.translate(-22, -50);
            ctx.rotate(-state.angle);
            
            const capGrad = ctx.createLinearGradient(0, 0, 44, 0);
            capGrad.addColorStop(0, '#2a2b30');
            capGrad.addColorStop(0.2, '#a5aab5'); 
            capGrad.addColorStop(0.5, '#4a4d54');
            capGrad.addColorStop(0.8, '#828791');
            capGrad.addColorStop(1, '#1a1b1f');

            ctx.fillStyle = capGrad;
            ctx.fillRect(0, -22, 44, 22);
            ctx.strokeRect(0, -22, 44, 22);
            ctx.restore();

            const mechGrad = ctx.createLinearGradient(-8, 0, 8, 0);
            mechGrad.addColorStop(0, '#111');
            mechGrad.addColorStop(0.5, '#666'); 
            mechGrad.addColorStop(1, '#111');
            ctx.fillStyle = mechGrad;
            ctx.fillRect(-8, -62, 16, 12);
            ctx.restore();
        }

        function handleInput(trackIndex) {
            if (gameState !== 'PLAYING') return;

            lighters[trackIndex].flameTime = 12;
            playClickSound();

            if (playMode === 'EDIT') {
                const now = performance.now();
                if (recordStartTime !== 0 && now >= recordStartTime) {
                    const beatInterval = 60000 / CONFIG.bpm / CONFIG.countPerBeat;
                    const beatIndex = Math.round((now - recordStartTime) / beatInterval);
                    if (!recordedBeats[beatIndex]) {
                        recordedBeats[beatIndex] = new Set();
                    }
                    recordedBeats[beatIndex].add(trackIndex + 1); 
                    triggerBurn(CONFIG.trackXs[trackIndex], CONFIG.hitY);
                    addScore(); 
                }
                return;
            }

            let targetNote = null;
            let minDistance = Infinity;

            for (let note of notes) {
                if (note.track === trackIndex) {
                    const dist = Math.abs(note.y - CONFIG.hitY);
                    if (dist < minDistance) {
                        minDistance = dist;
                        targetNote = note;
                    }
                }
            }

            if (targetNote && minDistance < CONFIG.hitWindow) {
                triggerBurn(targetNote.x, targetNote.y);
                floatingPhotos.push(new FloatingPhoto(targetNote.x, targetNote.y, targetNote.rotation, targetNote.image));
                targetNote.active = false;
                addScore();
            }
        }

        function triggerBurn(x, y) {
            for (let i = 0; i < CONFIG.particleCount; i++) {
                particles.push(new Particle(x, y, '#f97316'));
                particles.push(new Particle(x, y, '#222'));
            }
            playBurnSound();
        }

        function addScore() {
            score += 1;
            scoreVal.innerText = score;
        }

        function togglePause() {
            if (gameState === 'PLAYING') {
                gameState = 'PAUSED';
                pauseStartTime = performance.now();
                bgMusic.pause();
                pauseScreen.classList.remove('hidden');
                if (playMode === 'EDIT') {
                    showRhythmBtn.classList.remove('hidden');
                } else {
                    showRhythmBtn.classList.add('hidden');
                }
            } else if (gameState === 'PAUSED') {
                const pauseDuration = performance.now() - pauseStartTime;
                lastNoteTime += pauseDuration; 
                if (recordStartTime !== 0) recordStartTime += pauseDuration; 
                gameState = 'PLAYING';
                bgMusic.play();
                pauseScreen.classList.add('hidden');
                rhythmOutputScreen.classList.add('hidden');
            }
        }

        function playBeatSound() {
            if (!audioCtx || gameState !== 'PLAYING') return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(50, audioCtx.currentTime);
            g.gain.setValueAtTime(0.01, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playBurnSound() {
            if (!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const n = audioCtx.createBufferSource();
            n.buffer = buffer;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            n.connect(g); g.connect(audioCtx.destination);
            n.start();
        }

        function playClickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0.03, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return; 
            const keyMap = {
                'KeyD': 0, 'd': 0, 'D': 0,
                'KeyF': 1, 'f': 1, 'F': 1,
                'KeyJ': 2, 'j': 2, 'J': 2,
                'KeyK': 3, 'k': 3, 'K': 3
            };
            const trackIndex = keyMap[e.code] !== undefined ? keyMap[e.code] : keyMap[e.key];
            if (trackIndex !== undefined) {
                e.preventDefault();
                handleInput(trackIndex);
            }
            if (e.code === 'Escape') {
                togglePause();
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (gameState === 'PLAYING') {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    const trackIndex = Math.floor(touch.clientX / (window.innerWidth / 4));
                    handleInput(Math.max(0, Math.min(3, trackIndex)));
                }
            }
        }, {passive: false});

        function startGame(mode) {
            playMode = mode;
            let modeName = '观赏模式';
            let modeColor = '#a8a29e';
            if (mode === 'RHYTHM') { modeName = '节奏模式'; modeColor = '#b7791f'; }
            if (mode === 'EDIT') { modeName = '编辑模式'; modeColor = '#ef4444'; }
            modeDisplay.innerText = modeName;
            modeDisplay.style.color = modeColor;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gameState = 'PLAYING';
            startScreen.classList.add('hidden');
            secretScreen.classList.add('hidden');
            scoreBoard.classList.remove('hidden');
            currentMapIndex = 0;
            recordedBeats = {}; 
            recordStartTime = 0;
            score = 0;
            scoreVal.innerText = score;
            setTimeout(() => {
                if (gameState === 'PLAYING') {
                    lastNoteTime = performance.now();
                    recordStartTime = performance.now(); 
                    bgMusic.play().catch(err => console.log("Music play blocked:", err));
                }
            }, 0);
        }

        startObserveBtn.addEventListener('click', () => startGame('OBSERVE'));
        startRhythmBtn.addEventListener('click', () => startGame('RHYTHM'));
        startEditBtn.addEventListener('click', () => {
            secretScreen.classList.add('hidden');
            startGame('EDIT');
        });
        pauseBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePause();
        });
        resumeBtn.addEventListener('click', () => {
            togglePause();
        });
        quitBtn.addEventListener('click', () => {
            gameState = 'START';
            score = 0;
            scoreVal.innerText = score;
            notes = [];
            particles = [];
            floatingPhotos = [];
            currentMapIndex = 0;
            recordedBeats = {};
            recordStartTime = 0;
            lighters.forEach(l => {
                l.flameTime = 0;
                l.angle = 0;
            });
            bgMusic.pause();
            bgMusic.currentTime = 0;
            pauseScreen.classList.add('hidden');
            scoreBoard.classList.add('hidden');
            startScreen.classList.remove('hidden');
        });

        showRhythmBtn.addEventListener('click', () => {
            let rhythmString = "";
            let maxBeat = 0;
            for (let b in recordedBeats) {
                maxBeat = Math.max(maxBeat, parseInt(b));
            }
            for (let i = 0; i <= maxBeat; i++) {
                if (recordedBeats[i] && recordedBeats[i].size > 0) {
                    rhythmString += Array.from(recordedBeats[i])[0];
                } else {
                    rhythmString += "-";
                }
            }
            if(rhythmString === "") rhythmString = "空空如也...请先随音乐按下按键再查看";
            rhythmOutputText.value = rhythmString.splide(17);
            pauseScreen.classList.add('hidden');
            rhythmOutputScreen.classList.remove('hidden');
        });

        closeRhythmOutputBtn.addEventListener('click', () => {
            rhythmOutputScreen.classList.add('hidden');
            pauseScreen.classList.remove('hidden');
        });

        secretTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const now = Date.now();
            secretClickTimestamps = secretClickTimestamps.filter(t => now - t <= 5000);
            secretClickTimestamps.push(now);
            if (secretClickTimestamps.length >= 10) {
                secretClickTimestamps = []; 
                openSecretMenu();
            }
        });

        function openSecretMenu() {
            if (gameState === 'PLAYING') {
                wasPlayingBeforeSecret = true;
                togglePause(); 
            } else {
                wasPlayingBeforeSecret = false;
            }
            cfgSpeed.value = CONFIG.noteSpeed;
            cfgBpm.value = CONFIG.bpm;
            cfgHitWin.value = CONFIG.hitWindow;
            cfgParticles.value = CONFIG.particleCount;
            pauseScreen.classList.add('hidden');
            secretScreen.classList.remove('hidden');
        }

        closeSecretBtn.addEventListener('click', () => {
            CONFIG.noteSpeed = parseFloat(cfgSpeed.value) || 4.5;
            CONFIG.bpm = parseFloat(cfgBpm.value) || 75;
            CONFIG.hitWindow = parseFloat(cfgHitWin.value) || 90;
            CONFIG.particleCount = parseInt(cfgParticles.value) || 40;
            secretScreen.classList.add('hidden');
            if (wasPlayingBeforeSecret) {
                togglePause(); 
            } else if (gameState === 'PAUSED') {
                pauseScreen.classList.remove('hidden'); 
            }
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
